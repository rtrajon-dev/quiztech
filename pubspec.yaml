name: quiztech
description: "QuizTech — a quiz app built with a feature-first MVVM architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management & navigation (feature-first MVVM)
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # UI helpers
  flutter_screenutil: ^5.9.3
  form_field_validator: ^1.1.0
  fluttertoast: ^9.0.0

  # Local persistence (quiz progress + scores)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3

  # Quiz sound effects
  audioplayers: ^6.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/

  fonts:
    - family: Ubuntu
      fonts:
        - asset: fonts/Ubuntu-Bold.ttf
        - asset: fonts/Ubuntu-Regular.ttf
